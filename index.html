<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Para Fátima ❤️</title>
<style>
body{margin:0;background:#efe3d1;font-family:Georgia,serif;color:#4a2d2d}
#cover{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(#3b2430,#8b5e6b);color:#fff;flex-direction:column}
#envelope{padding:20px 40px;border:2px solid #fff;border-radius:12px;cursor:pointer}
main{display:none;max-width:700px;margin:auto;padding:20px}
.paper{background:#f9f1e4;padding:25px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.2)}
h1{text-align:center}
.photo{width:100%;margin:18px 0;border:8px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.reason{display:none;margin:10px 0;padding:10px;background:#fff7ef;border-left:4px solid #c55}
button{padding:10px 18px;border:none;border-radius:8px;background:#a04;color:#fff}
</style>
</head>
<body>
<div id="cover">
<h2>Una carta para Fátima ❤️</h2>
<div id="envelope">Toca para abrir el sobre</div>
<audio id="music" src="2lwvku.m4a"></audio>
</div>
<main id="content">
<div class="paper">
<h1>Mi hermosa Fátima</h1>
<p id="text"></p>

<img class="photo" src="7ku7di.jpg">
<img class="photo" src="7ok5q4.jpg">
<img class="photo" src="8g5s0y.jpg">

<h2>¿Sabes cuáles son las razones por las que te amo? ❤️</h2>
<button onclick="nextReason()">Descubrir otra razón</button>

<div id="reasons"></div>

<p style="text-align:right">Con todo mi amor,<br><b>Juan ❤️</b></p>
</div>
</main>

<script>
const msg=`Mi hermosa Fátima:

Desde que llegaste a mi vida todo cambió para bien. Eres una mujer increíble, hermosa por dentro y por fuera. Tu sonrisa ilumina mis días, tu mirada me da paz y tu forma de ser hace que cada momento contigo sea especial.

Gracias por existir, por regalarme tu cariño y por permitirme formar parte de tu vida. Cada día encuentro una razón más para enamorarme de ti.`;

const p=document.getElementById("text");
let i=0;
function type(){
 if(i<msg.length){p.textContent+=msg[i++];setTimeout(type,35);}
}
document.getElementById("envelope").onclick=()=>{
 let a=document.getElementById("music");
 a.currentTime=61;
 a.play().catch(()=>{});
 document.getElementById("cover").style.display="none";
 document.getElementById("content").style.display="block";
 type();
}

const list=[
"Porque eres hermosa.",
"Porque tu sonrisa alegra mis días.",
"Porque tus ojos me enamoran.",
"Porque me haces feliz.",
"Porque eres mi lugar seguro.",
"Porque confías en mí.",
"Porque me inspiras a ser mejor.",
"Porque eres tierna.",
"Porque eres fuerte.",
"Porque eres inteligente.",
"Porque me haces sentir amado.",
"Porque siempre pienso en ti.",
"Porque contigo todo tiene más sentido.",
"Porque eres mi novia y el amor de mi vida.",
"Porque simplemente eres tú."
];
let r=0;
function nextReason(){
 if(r>=list.length)return;
 const d=document.createElement("div");
 d.className="reason";
 d.textContent="❤️ "+list[r++];
 document.getElementById("reasons").appendChild(d);
 d.style.display="block";
}
</script>
</body>
</html>
